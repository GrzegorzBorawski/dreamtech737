<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CDU Panel Interface</title>
</head>
<body>
    <div class="cdu-panel">
        <div class="display-screen">
            <h1>Display Screen</h1>
        </div>
        <div class="function-buttons">
            <button>Func1</button>
            <button>Func2</button>
            <button>Func3</button>
            <button>Func4</button>
        </div>
        <div class="numeric-buttons">
            <button>A</button>
            <button>B</button>
            <button>C</button>
            <button>D</button>
            <button>E</button>
            <button>F</button>
            <button>G</button>
            <button>H</button>
        </div>
        <div class="control-buttons">
            <button>PREV</button>
            <button>NEXT</button>
            <button>CLR</button>
            <button>DEL</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
