<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CDU Panel</title>
</head>
<body>
    <div class="cdu-panel">
        <div class="display" id="display">MSFS PROJECTS</div>
        <div class="button-panel">
            <button class="function-button">INIT</button>
            <button class="function-button">REF</button>
            <button class="function-button">RTE</button>
            <button class="function-button">CLB</button>
            <button class="function-button">CRZ</button>
            <button class="function-button">DES</button>
            <button class="function-button">MENU</button>
            <button class="function-button">EXEC</button>
            <br>
            <button class="num-button">7</button>
            <button class="num-button">8</button>
            <button class="num-button">9</button>
            <button class="num-button">4</button>
            <button class="num-button">5</button>
            <button class="num-button">6</button>
            <button class="num-button">1</button>
            <button class="num-button">2</button>
            <button class="num-button">3</button>
            <button class="num-button">0</button>
            <button class="alpha-button">A</button>
            <button class="alpha-button">B</button>
            <button class="alpha-button">C</button>
            <button class="alpha-button">D</button>
            <button class="alpha-button">E</button>
            <button class="alpha-button">F</button>
            <button class="alpha-button">G</button>
            <button class="alpha-button">H</button>
            <button class="alpha-button">I</button>
            <button class="alpha-button">J</button>
            <button class="alpha-button">K</button>
            <button class="alpha-button">L</button>
            <button class="alpha-button">M</button>
            <button class="alpha-button">N</button>
            <button class="alpha-button">O</button>
            <button class="alpha-button">P</button>
            <button class="alpha-button">Q</button>
            <button class="alpha-button">R</button>
            <button class="alpha-button">S</button>
            <button class="alpha-button">T</button>
            <button class="alpha-button">U</button>
            <button class="alpha-button">V</button>
            <button class="alpha-button">W</button>
            <button class="alpha-button">X</button>
            <button class="alpha-button">Y</button>
            <button class="alpha-button">Z</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
